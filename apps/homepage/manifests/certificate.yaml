apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: local-sidd-cc
  namespace: homepage
spec:
  secretName: local-sidd-cc-tls
  issuerRef:
    name: letsencrypt-cloudflare
    kind: ClusterIssuer
  commonName: "*.siddhomelab.cc"
  dnsNames:
  - "siddhomelab.cc"
  - "*.siddhomelab.cc"
