# values.yaml
replicaCount: 1

image:
  pullPolicy: Always

persistence:
  config:
    enabled: true
    size: 5Gi
    storageClass: 'local-path'
  media:
    enabled: true
    size: 100Gi
    storageClass: 'nfs-media-retain'

podSecurityContext:
  fsGroup: 1000

securityContext:
  runAsUser: 1000
  runAsGroup: 1000
  runAsNonRoot: true

ingress:
  enabled: true
  className: 'tailscale'
  hosts:
    - host: jellyfin 
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - jellyfin

resources:
  limits:
    cpu: 2000m
    memory: 1.5Gi
  requests:
    cpu: 500m
    memory: 1Gi

nodeSelector:
  kubernetes.io/hostname: deb-k3s-agent
tolerations: []
affinity: {}