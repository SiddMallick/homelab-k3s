apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace | default "default" }}
  labels:
    app: {{ .Release.Name }}
    environment: {{ .Values.environment | default "dev" }}
    app.kubernetes.io/name: {{ .Release.Name }}
spec:
  selector:
    app: {{ .Release.Name }}
    environment: {{ .Values.environment | default "dev" }}
    app.kubernetes.io/name: {{ .Release.Name }}
  type: ClusterIP
  ports:
  - protocol: TCP
    port: {{ .Values.service.port}}
    targetPort: {{ .Values.containerPort }}