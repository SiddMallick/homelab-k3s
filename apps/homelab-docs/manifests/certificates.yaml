apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: local-sidd-cc-homelab-docs
  namespace: docs
spec:
  secretName: local-sidd-cc-tls-homelab-docs
  issuerRef:
    name: letsencrypt-cloudflare
    kind: ClusterIssuer
  commonName: "*.siddhomelab.cc"
  dnsNames:
  - "siddhomelab.cc"
  - "*.siddhomelab.cc"
